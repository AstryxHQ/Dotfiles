
font_size 10.0

# Setup basic typography
disable_ligatures never

# BEGIN_KITTY_FONTS
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
window_margin_width 2
window_padding_width 5

# Modern UI Effects
cursor_trail 1
background_opacity 0.95
background_blur 1

# Theme Import
include rose-pine.conf

